apiVersion: v1
kind: Pod

metadata:
  name: cippod
  labels:
    app: myapp
spec:
  containers:
    - name: nginx-containers
      image: nginx:latest
      ports:
        - name: nginx-port
          containerPort: 80
...
---

apiVersion: v1 
kind: Service 
metadata: 
  name: ciservice 
  labels: 
    app: myapp 
spec: 
  type: ClusterIP 
  selector: 
    app: myapp 
  ports: 
    - name: nginxsvc-port 
      protocol: TCP 
      port: 80 
      targetPort: 80
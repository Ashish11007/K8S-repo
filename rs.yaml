apiVersion: apps/v1 
kind: ReplicaSet 
metadata: 
  name: my-rs 
  labels: 
    app: myapp
spec: 
  replicas: 2 
  selector: 
    matchLabels: 
      app: myapp
  template: 
    metadata: 
      name: my-rs-template
      labels: 
        app: myapp
    spec: 
      containers: 
        - name: notes-app-container
          image: ashish050904/notes-app-k8s:latest
          ports: 
            - name: nginxport
              containerPort: 8000
...
---
apiVersion: v1 
kind: Service 
metadata: 
  name: rs-svc 
  labels: 
    app: myapp
spec: 
  type: NodePort
  selector: 
    app: myapp
  ports: 
    - name: svc-port 
      protocol: TCP 
      port: 8000
      targetPort: 8000
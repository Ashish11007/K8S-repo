apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-shop-blue
  namespace: blue-green-ns
  labels:
    app: online-shop-blue
spec:
  replicas: 4
  selector:
    matchLabels:
      app: online-shop-blue
  template:
    metadata: 
      labels:
        app: online-shop-blue
    spec:
      containers: 
      - name: online-shop-blue
        image: amitabhdevops/online_shop_without_footer

...
---
apiVersion: v1
kind: Service
metadata:
  name: online-shop-blue-deployment-service
  namespace: blue-green-ns
spec:
  selector:
    app: online-shop-blue
  type: NodePort
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3000
      nodePort: 30001
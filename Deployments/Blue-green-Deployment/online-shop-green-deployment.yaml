apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-shop-green
  namespace: blue-green-ns
  labels:
    app: online-shop-green
spec:
  replicas: 4
  selector:
    matchLabels:
      app: online-shop-green
  template:
    metadata:
      labels:
        app: online-shop-green
    spec:
      containers:
      - name: online-shop-green
        image: amitabhdevops/online_shop

...
---
apiVersion: v1
kind: Service
metadata:
  name: online-shop-green-deployment-sservice
  namespace: blue-green-ns
spec:
  selector:
    app: online-shop-green
  type: NodePort
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30000
        
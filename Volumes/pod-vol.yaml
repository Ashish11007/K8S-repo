apiVersion: v1
kind: Pod

metadata:
  name: mypod
  labels:
    app: myapp

spec:
  volumes:
    - name: my-vol
      persistentVolumeClaim:
        claimName: mypvc

  containers:
    - name: myapp
      image: nginx

      ports:
        - name: http-port
          containerPort: 80

      volumeMounts:
        - name: my-vol
          mountPath: /usr/share/nginx/html

          
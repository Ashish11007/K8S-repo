apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: my-daemonset
  labels:
    app: myapp
spec:
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: daemon-container
        image: amazon/cloudwatch-agent
        ports:
          - name: daemonport
            containerPort: 80
            